openapi: 3.1.0
info:
  title: Smart Campus — Core Business Service (A6)
  version: 1.0.0
  description: |
    Hợp đồng API mẫu cho A6. Cung cấp API để Notification (A7) lấy chi tiết cảnh báo.
  contact:
    name: API Support
    email: support@campus.local
servers:
  - url: http://localhost:4011
    description: Prism mock server
tags:
  - name: alerts
    description: Quản lý cảnh báo
security:
  - bearerAuth: []
paths:
  /alerts/{alertId}:
    get:
      operationId: getAlertById
      summary: Lấy chi tiết một cảnh báo
      description: Lấy chi tiết alert theo UUID. Endpoint này sẽ được Notification gọi để lấy thêm chi tiết.
      tags: [alerts]
      parameters:
        - name: alertId
          in: path
          required: true
          description: UUID của cảnh báo.
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Chi tiết cảnh báo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Alert'
              examples:
                found:
                  value:
                    id: 0196fb3d-4ad7-7d1e-9f49-5d5148d2babc
                    alertType: UNAUTHORIZED_ACCESS
                    severity: HIGH
                    message: Phát hiện truy cập trái phép tại cổng chính
        '401':
          description: Unauthorized
        '404':
          description: Not Found

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Alert:
      type: object
      required: [id, alertType, severity, message]
      properties:
        id:
          type: string
          format: uuid
        alertType:
          type: string
        severity:
          type: string
          enum: [LOW, MEDIUM, HIGH, CRITICAL]
        message:
          type: string
